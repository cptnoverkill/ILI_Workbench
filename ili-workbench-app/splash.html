<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    user-select: none;
    -webkit-user-select: none;
    overflow: hidden;
  }
  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #4493f8, #a371f7);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 700; color: #fff;
    font-family: monospace;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(68,147,248,0.3);
  }
  .title {
    font-size: 18px;
    font-weight: 700;
    color: #f0f6fc;
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .sub {
    font-size: 11px;
    color: #484f58;
    margin-bottom: 32px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .bar-wrap {
    width: 200px;
    height: 3px;
    background: #21262d;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4493f8, #a371f7);
    border-radius: 2px;
    animation: load 1.8s ease-in-out forwards;
  }
  @keyframes load {
    0%   { width: 0%; }
    30%  { width: 45%; }
    70%  { width: 75%; }
    90%  { width: 90%; }
    100% { width: 100%; }
  }
  .version {
    margin-top: 20px;
    font-size: 10px;
    color: #30363d;
    font-family: monospace;
  }
</style>
</head>
<body>
  <div class="logo-icon">C²</div>
  <div class="title">ILI Correlation Workbench</div>
  <div class="sub">Pipeline Integrity Analysis</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="version">V0.2.7 · © 2026 C-Squared</div>
</body>
</html>
